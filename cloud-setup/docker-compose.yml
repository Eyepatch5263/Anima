version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: cloud_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: anime_db
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  qdrant:
    image: qdrant/qdrant:latest
    container_name: cloud_qdrant
    restart: always
    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  ollama:
    image: ollama/ollama:latest
    container_name: cloud_ollama
    restart: always
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  tei-embeddings:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.6
    container_name: cloud_tei_embeddings
    restart: always
    command: --model-id thenlper/gte-small
    ports:
      - "127.0.0.1:8080:80"

  tei-rerank:
    image: ghcr.io/huggingface/text-embeddings-inference:1.6
    container_name: cloud_tei_rerank
    restart: always
    command: --model-id cross-encoder/ms-marco-MiniLM-L-6-v2
    ports:
      - "127.0.0.1:8082:80"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  nginx:
    image: nginx:alpine
    container_name: cloud_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - qdrant
      - ollama
      - tei-embeddings
      - tei-rerank

volumes:
  postgres_data:
  qdrant_data:
  ollama_data:
