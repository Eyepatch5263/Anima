user nginx;
worker_processes auto;

error_log /var/log/nginx/error.log notice;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    keepalive_timeout 65;

    client_max_body_size 50M;

    server {
        listen 80;
        server_name localhost;

        # Docker's internal DNS resolver
        resolver 127.0.0.11 valid=10s;

        # Health check endpoint
        location /health {
            return 200 'OK';
            add_header Content-Type text/plain;
        }

        # Qdrant HTTP API proxy
        location /qdrant/ {
            set $qdrant_upstream http://cloud_qdrant:6333;
            rewrite ^/qdrant/(.*) /$1 break;
            proxy_pass $qdrant_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Disable buffering for big streaming requests
            proxy_buffering off;
        }

        # Ollama API proxy
        location /ollama/ {
            set $ollama_upstream http://cloud_ollama:11434;
            rewrite ^/ollama/(.*) /$1 break;
            proxy_pass $ollama_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Disable buffering for chunked streaming LLM responses
            proxy_buffering off;
            proxy_read_timeout 300s;
        }
    }
}
